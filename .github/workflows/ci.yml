name: NeoAnvil SRE Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Install Dependencies
      run: go mod tidy

    - name: Formatting (go fmt)
      run: |
        if [ "$(go fmt ./...)" ]; then
          echo "Code is not formatted properly. Please run 'go fmt ./...'"
          exit 1
        fi

    - name: Execute Tests (Race Detector)
      run: go test -v -race ./...

    - name: Build Orchestrator (neo-mcp)
      run: go build -o bin/neo-mcp ./cmd/neo-mcp

    - name: Build Chaos Simulator (stress)
      run: go build -o bin/stress ./cmd/stress
