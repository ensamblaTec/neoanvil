# NeoAnvil — docker-compose stack (Area 1.1.B)
#
# Three services:
#   · neoanvil      — Nexus dispatcher + spawned MCP workers (fd-inheritance
#                     requires SINGLE container; do NOT split into multiple).
#   · ollama        — LLM inference (chat/completion).
#   · ollama-embed  — dedicated embedding endpoint (nomic-embed-text).
#                     Separated because embed traffic should not contend with
#                     chat completion latency.
#
# All ports are env-overridable (see .env.example) so the stack can run
# side-by-side with a native install:
#   default              → 9000 / 8087 / 11434 / 11435 (collides with native)
#   recommended override → 19000 / 18087 / 11534 / 11535
#
# Volumes are NAMED (not bind-mounts). BoltDB flock semantics break under
# overlayfs, and named volumes use the host's native filesystem driver
# (ext4/xfs), which honors flock correctly.
#
# GPU: ollama services request all NVIDIA GPUs via the modern compose
# `deploy.resources` block. Requires `nvidia-container-toolkit` on the
# host. If absent, comment out the `deploy:` blocks — Ollama still runs
# on CPU, just slower.

services:

  neoanvil:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOAMD64: ${GOAMD64:-v3}
        # Pattern D — UID/GID alignment with host operator so bind-
        # mounted repo files stay readable on the host. Override via
        # `USER_ID=$(id -u) USER_GID=$(id -g) make docker-build`.
        USER_ID: ${USER_ID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: neoanvil:${NEOANVIL_TAG:-local}
    container_name: neoanvil
    restart: unless-stopped
    # Defense in depth (DS-AUDIT 1.1.B follow-up): block setuid binaries
    # from acquiring privileges even if a CVE in `su-exec` or the kernel
    # is later disclosed. The entrypoint still legitimately uses `su-exec`
    # to drop privileges (which doesn't *gain* — only loses), so this is
    # additive hardening with no functional cost.
    security_opt:
      - no-new-privileges:true
    depends_on:
      ollama:
        condition: service_healthy
      ollama-embed:
        condition: service_healthy
    environment:
      # 1.1.C wired these into neo-nexus / neo-mcp config:
      #   NEO_BIND_ADDR                       → pkg/nexus/config.go::applyEnvOverrides
      #   OLLAMA_HOST / OLLAMA_EMBED_HOST     → pkg/config/config.go::LoadConfig
      #   NEO_NEXUS_OLLAMA_LIFECYCLE=disabled → forces Nexus services.ollama_*.enabled=false
      #                                         (compose manages those services here)
      NEO_BIND_ADDR: "0.0.0.0"
      OLLAMA_HOST:       "http://ollama:11434"
      OLLAMA_EMBED_HOST: "http://ollama-embed:11434"
      NEO_NEXUS_OLLAMA_LIFECYCLE: "disabled"
    ports:
      - "${NEXUS_PORT:-9000}:9000"      # MCP dispatcher
      - "${HUD_PORT:-8087}:8087"        # Operator HUD dashboard
    volumes:
      # Pattern D — Hybrid layout (Area 1.4):
      # State lives in named volumes (BoltDB-safe, survives `down`).
      # Source code is bind-mounted from the host so the operator edits
      # in their IDE while neoanvil reads/writes inside the container.
      # Host-side auth + plugin manifests are bind-mounted READ-ONLY
      # into a staging dir; entrypoint copies them into the named volume
      # only on first boot so the container has a writable copy without
      # contaminating the operator's host config.

      # State (named volumes — BoltDB flock works on host filesystem driver)
      - neoanvil-state:/home/neo/.neo
      - neoanvil-work:/home/neo/work    # additional workspaces operator can `neo setup` inside

      # Source code bind — REPO_PATH defaults to the directory `docker compose`
      # was invoked from. Operator can override to mount a different repo.
      # Read-write so neoanvil can certify files + write to <repo>/.neo/.
      - ${REPO_PATH:-${PWD}}:/home/neo/work/repo

      # Host config staging — bind ONLY credentials.json + plugins.yaml
      # individually, read-only. Mounting the whole ~/.neo/ leaks
      # workspaces.json, audit-*.log, pki/, db/, shared/ to a
      # potentially-malicious npm/Go dependency running inside the
      # container (DS audit Finding 1, SEV High, CWE 200).
      #
      # Both source files must exist before `docker compose up` —
      # `make docker-up` runs a preflight that touches them empty if
      # absent (matching the original silent-skip-when-absent behaviour
      # but without leaking the rest of $HOME/.neo). The entrypoint
      # still seed_if_absent's into the named volume; an empty source
      # file just means "no credentials provisioned, skip seed".
      - ${HOME}/.neo/credentials.json:/home/neo/.neo-host/credentials.json:ro
      - ${HOME}/.neo/plugins.yaml:/home/neo/.neo-host/plugins.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/status > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - neoanvil-net

  ollama:
    image: ollama/ollama:${OLLAMA_TAG:-latest}
    container_name: neoanvil-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"          # warm models in VRAM 30min after last call
      OLLAMA_NUM_PARALLEL: "2"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - neoanvil-net

  ollama-embed:
    image: ollama/ollama:${OLLAMA_TAG:-latest}
    container_name: neoanvil-ollama-embed
    restart: unless-stopped
    ports:
      - "${OLLAMA_EMBED_PORT:-11435}:11434"
    volumes:
      - ollama-embed-models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "4"          # Embed workload is small + parallel-friendly
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - neoanvil-net

networks:
  neoanvil-net:
    driver: bridge

volumes:
  neoanvil-state:
  neoanvil-work:
  ollama-models:
  ollama-embed-models:
